services:
  - type: web
    name: intentapi
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./intentapi.db
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /health
